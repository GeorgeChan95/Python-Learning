<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>模板宏的使用</title>
</head>
{% macro inp(type, name='', value='')%}
        <input type="{{type}}" name="{{name}}" value="{{value}}">
{% endmacro %}
<body>


    <h1>不使用宏</h1>
    <table>
        <tr>
            <td>用户名：</td><td><input type="text" name="" value=""></td>
        </tr>
        <tr>
            <td>密码：</td><td><input type="password" name="" value=""></td>
        </tr>
        <tr>
            <td><input type="submit" value="登录"></td>
        </tr>
    </table>

    <h1>使用宏</h1>
    <table>
        <tr>
            <td>用户名：</td><td>{{ inp('text', 'username') }}</td>
        </tr>
        <tr>
            <td>密码：</td><td> {{ inp('password', 'pwd') }} </td>
        </tr>
        <tr>
            <td>{{ inp('submit', value='登录') }}</td>
        </tr>
    </table>
</body>
</html>
